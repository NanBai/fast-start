    status: passed
  - item: "场景10 关闭重开：重开后列表为新扫描结果，不依赖持久化"
    source: 验收场景
    status: passed
  - item: "场景11 终端未安装：Ghostty 未装 → 下拉灰显，list_available_terminals 不返回它"
    source: 验收场景
    status: passed
  - item: "场景12 cwd 校验失败：session 的 project_dir 已删除 → 启动返回明确错误，不执行 shell"
