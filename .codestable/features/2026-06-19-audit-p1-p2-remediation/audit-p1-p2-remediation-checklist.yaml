steps:
  - action: "微重构骨架：前端只搬不改行为地拆组件 / 样式"
    exit_signal: "pnpm build 通过；主界面仍能展示 toolbar、分组、项目折叠、会话行和状态提示"
    status: done
  - action: "启动编排：移除 Tauri setup 同步扫描"
    exit_signal: "AppState 初始化不调用全量 scanner；首次 scan_sessions 仍返回与原来等价的 ScanResponse"
    status: done
  - action: "scanner 数据源与 fixture：让测试脱离真实 HOME"
    exit_signal: "Codex / Claude / Cursor scanner 单测全部使用临时 fixture，删除路径不存在就 return 的假跳过"
    status: done
  - action: "Cursor 读取节点：替换每 chat 一个 sqlite3 子进程"
    exit_signal: "Cursor workspace path fixture 测试通过，代码中不再出现循环内 Command::new(\"sqlite3\")"
    status: done
  - action: "摘要与注释收敛：修 Codex 64 行边界和 cd=false 旧语义"
    exit_signal: "Codex 真实用户消息位于 64 行后仍能提取；源码当前注释不再表达 cursor 不 cd"
    status: done
  - action: "Launcher 安全收敛：Terminal/iTerm 使用 wrapper 启动"
    exit_signal: "Terminal/iTerm/Ghostty 三条 launcher 单测覆盖 wrapper 内容和 AppleScript 注入形态；cargo test --lib 通过"
    status: done
  - action: "CSP 与全链路验证"
    exit_signal: "pnpm build、cargo test --lib 通过；Tauri dev 或等效 smoke 能正常加载页面、扫描、启动 session"
    status: done

