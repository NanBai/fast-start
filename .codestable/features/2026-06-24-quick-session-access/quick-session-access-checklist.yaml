feature: 2026-06-24-quick-session-access
created: 2026-06-24

steps:
  - action: "实现前状态收尾 gate：确认工作树状态并修正会误导后续任务的 attention git 说明"
    exit_signal: "工作树状态已记录清楚，.codestable/attention.md 的 git 说明不再误导后续任务"
    status: done
  - action: "微重构：拆出 App 编排 hook，只搬不改行为"
    exit_signal: "偏好加载、session 加载、启动、删除行为不变，pnpm build 通过"
    status: done
  - action: "快速访问纯计算层：实现最近天数、查询和收藏排序的统一派生结果"
    exit_signal: "搜索过滤、空查询、大小写不敏感匹配、收藏排序都有可验证结果"
    status: done
  - action: "静态 UI 接入：增加搜索入口和项目收藏按钮"
    exit_signal: "控制栏出现搜索入口，项目 header 出现收藏按钮；无搜索时现有列表视觉和折叠默认行为不变"
    status: done
  - action: "交互与键盘编排：接入搜索焦点、活跃匹配项和回车启动"
    exit_signal: "Cmd/Ctrl+K、上下键、回车、Escape 在搜索输入聚焦时按预期工作，不影响其他控件"
    status: done
  - action: "收藏持久化接入：复用 Tauri Store 偏好链路保存项目收藏"
    exit_signal: "收藏项目保存到 Tauri Store，刷新或重启后仍生效；保存失败有回滚和错误提示"
    status: done
  - action: "联调与回归验证：覆盖快速访问主路径和既有 session 主路径"
    exit_signal: "pnpm build、cd src-tauri && cargo test --lib 通过；搜索、收藏、刷新、删除、启动主路径均有 smoke 证据"
    status: done

