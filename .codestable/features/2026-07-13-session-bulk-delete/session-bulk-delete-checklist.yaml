feature: 2026-07-13-session-bulk-delete
created: 2026-07-13

dod:
  commands:
    - id: CMD-001
      command: "cd src-tauri && cargo test --lib"
      core: true
      failure_handling: fix-or-block
    - id: CMD-002
      command: "pnpm build"
      core: true
      failure_handling: fix-or-block
  evidence_required: [command_output, manual_smoke, req_update]
  cleanliness:
    debug_output: forbidden

steps:
  - action: "cs-req 修订 delete-session-context-menu 允许批量"
    exit_signal: "requirement 文案含批量+确认+partial"
    status: done
  - action: "delete_sessions 全路径 + 单测（OpenCode/上限/缓存窗）"
    exit_signal: "cargo test 绿"
    status: done
  - action: "整批 sanitize_recent_launches + 写盘"
    exit_signal: "删后 recent 无幽灵 id"
    status: done
  - action: "多选 UI + 确认 + failures 展示"
    exit_signal: "pnpm build；手工可丢弃 smoke"
    status: done

checks:
  - item: "禁止只调 delete_session_target"
    source: 流程级约束
    status: passed
  - item: "上限 50 / 空数组 Err"
    source: 名词契约
    status: passed
  - item: "UI 展示 failures"
    source: 验收场景
    status: passed
  - item: "无回收站 / 不传路径"
    source: 范围守护
    status: passed
  - item: "req 已允许批量"
    source: 挂载点
    status: passed
