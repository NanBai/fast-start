feature: 2026-07-13-launch-history-and-preview
created: 2026-07-13

dod:
  commands:
    - id: CMD-001
      command: "cd src-tauri && cargo test --lib"
      core: true
      failure_handling: fix-or-block
    - id: CMD-002
      command: "pnpm build"
      core: true
      failure_handling: fix-or-block
  evidence_required: [command_output, diff_summary, manual_smoke]
  cleanliness:
    debug_output: forbidden

steps:
  - action: "preferences + launch 成功写入 + sanitize"
    exit_signal: "逻辑可测"
    status: done
  - action: "preview_launch_command 命令"
    exit_signal: "cargo test/校验白名单"
    status: done
  - action: "UI 最近启动与预览"
    exit_signal: "pnpm build；手工"
    status: done
  - action: "文档一句"
    exit_signal: "docs 含最近启动"
    status: done

checks:
  - item: "仅成功 launch 写入"
    source: 流程级约束
    status: done
  - item: "preview 不执行命令"
    source: 验收场景
    status: done
  - item: "上限 20 + sanitize"
    source: 名词契约
    status: done
