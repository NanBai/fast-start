feature: 2026-07-13-wave-harden-and-docs
created: 2026-07-13

dod:
  commands:
    - id: CMD-001
      command: "cd src-tauri && cargo test --lib"
      core: true
      failure_handling: fix-or-block
    - id: CMD-002
      command: "pnpm build"
      core: true
      failure_handling: fix-or-block
  evidence_required: [command_output, diff_summary, manual_smoke]
  cleanliness:
    debug_output: forbidden

steps:
  - action: "全量验证命令 + 记录证据"
    exit_signal: "CMD-001/002 通过"
    status: pending
  - action: "ARCHITECTURE/用户文档/AGENTS 同步"
    exit_signal: "关键关键词存在"
    status: pending
  - action: "epic items 收口检查与 residual risk"
    exit_signal: "acceptance 文档完成"
    status: pending

checks:
  - item: "文档与实现一致"
    source: 验收场景
    status: pending
  - item: "无未解释的架构冲突"
    source: 范围守护
    status: pending
